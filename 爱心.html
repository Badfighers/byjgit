<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>满屏爱心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .heart {
            position: absolute;
            pointer-events: none;
            font-size: 2rem;
            animation: float-up 3s ease-in forwards;
            opacity: 0.8;
        }

        @keyframes float-up {
            0% {
                transform: translateY(0) translateX(var(--offset-x, 0)) scale(1);
                opacity: 1;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(var(--offset-x, 100px)) scale(0.5);
                opacity: 0;
            }
        }

        .heart-red {
            color: #ff1493;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.8);
        }

        .heart-pink {
            color: #ff69b4;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
        }

        .heart-rose {
            color: #ff6b9d;
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.8);
        }

        .heart-coral {
            color: #ff7f50;
            text-shadow: 0 0 10px rgba(255, 127, 80, 0.8);
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: -1;
            pointer-events: none;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
        }

        .name-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            pointer-events: none;
            animation: name-fade 3s ease-in-out forwards;
        }

        .name-text {
            font-size: 4rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 30px rgba(255, 182, 193, 0.9), 0 0 60px rgba(255, 105, 180, 0.6);
            letter-spacing: 0.3em;
            animation: name-zoom 3s ease-in-out forwards;
        }

        @keyframes name-zoom {
            0% {
                transform: scale(2);
                opacity: 0;
            }
            30% {
                transform: scale(1);
                opacity: 1;
            }
            80% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(0.8);
                opacity: 0;
            }
        }

        @keyframes name-fade {
            0%, 70% {
                visibility: visible;
            }
            100% {
                visibility: hidden;
            }
        }
    </style>
</head>
<body>
    <div class="name-overlay">
        <span class="name-text">黄升颖</span>
    </div>
    <div class="title">❤️</div>
    <div class="container" id="container"></div>

    <script>
        const container = document.getElementById('container');
        const heartSymbols = ['❤️', '💕', '💖', '💗', '💝', '💓', '💞'];
        const heartColors = ['heart-red', 'heart-pink', 'heart-rose', 'heart-coral'];

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');

            const symbol = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            const color = heartColors[Math.floor(Math.random() * heartColors.length)];

            heart.textContent = symbol;
            heart.classList.add(color);

            const randomX = Math.random() * window.innerWidth;
            heart.style.left = randomX + 'px';
            heart.style.bottom = '-50px';

            const duration = 3 + Math.random() * 2;
            heart.style.animationDuration = duration + 's';

            const offsetX = (Math.random() - 0.5) * 200;
            heart.style.setProperty('--offset-x', offsetX + 'px');

            container.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        setInterval(createHeart, 300);

        document.addEventListener('click', function(e) {
            for (let i = 0; i < 5; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');

                const symbol = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                const color = heartColors[Math.floor(Math.random() * heartColors.length)];

                heart.textContent = symbol;
                heart.classList.add(color);
                heart.style.left = e.clientX + 'px';
                heart.style.top = e.clientY + 'px';

                const duration = 2 + Math.random() * 1;
                heart.style.animationDuration = duration + 's';

                container.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, duration * 1000);
            }
        });

        for (let i = 0; i < 10; i++) {
            setTimeout(createHeart, i * 100);
        }
    </script>
</body>
</html>
